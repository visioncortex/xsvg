<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xsvg — preview</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #fff;
        overflow: hidden; /* contained content never overflows; belt-and-braces */
      }
      /* The host box for the shared createPreview() surface, which fills it

      #app {
        position: relative;
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/preview/main.ts"></script>
  </body>

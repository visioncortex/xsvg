<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xsvg — preview</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #fff;
        overflow: hidden; /* contained content never overflows; belt-and-braces */
      }
      /* Fit-to-contain: the SVG fills the viewport box and its own viewBox +
         preserveAspectRatio="meet" scales the drawing to fit (up or down), centered
         and letterboxed — no scrollbars, iframe-friendly. */
      #app {
        width: 100%;
        height: 100vh;
      }
      #app > svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      .error {
        margin: 16px;
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #b00020;
        white-space: pre-wrap;
      }
      /* Slide nav — only present when the document has multiple artboards. */
      .deck-nav {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 5px 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.25);
        color: #f8fafc;
        font: 13px/1 "Helvetica Neue", Arial, sans-serif;
      }
      .deck-nav button {
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #f8fafc;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
      }
      .deck-nav button:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.14);
      }
      .deck-nav button:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .deck-label {
        min-width: 96px;
        text-align: center;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/preview/main.ts"></script>
  </body>
</html>

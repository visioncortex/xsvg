<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xsvg — interactive viewer</title>
    <style>
      html, body { height: 100%; margin: 0; }
      .viewer { position: relative; display: flex; flex-direction: column; height: 100vh; font: 14px/1.5 system-ui, sans-serif; }
      .toolbar { display: flex; align-items: center; gap: 12px; padding: 8px 14px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; font-size: 14px; }
      .toolbar .brand { font-weight: 700; font-size: 15px; color: #2563eb; text-decoration: none; }
      .toolbar .doc-name { color: #64748b; font: 12.5px/1 ui-monospace, SFMono-Regular, Menlo, monospace; text-decoration: none; }
      .toolbar .spacer { flex: 1; }
      .toolbar a { color: #2563eb; text-decoration: none; font-size: 13px; }
      .toolbar a[href]:hover { text-decoration: underline; }
      #view { flex: 1; min-height: 0; }
      .drop-hint { position: absolute; left: 12px; bottom: 10px; padding: 4px 10px; border-radius: 6px; background: rgba(15,23,42,.62); color: #fff; font-size: 12px; pointer-events: none; }
      @media (prefers-color-scheme: dark) {
        html, body { background: #0f172a; }
        .toolbar { background: #0f172a; border-bottom-color: #334155; }
        .toolbar .brand, .toolbar a { color: #60a5fa; }
        .toolbar .doc-name { color: #94a3b8; }
      }
    </style>
  </head>
  <body>
    <div class="viewer">
      <header class="toolbar">
        <a class="brand" href="https://xsvg.visioncortex.org" target="_blank" rel="noopener">xsvg</a>
        <a id="doc-name" class="doc-name" target="_blank" rel="noopener"></a>
        <span class="spacer"></span>
        <a id="download-svg" href="#" title="Download the compiled plain SVG" hidden>Download SVG ↓</a>
        <a id="open-playground" href="/playground/">Open in playground →</a>
      </header>
      <xsvg-view-interactive id="view" inspector></xsvg-view-interactive>
      <p id="drop-hint" class="drop-hint">Drop a .xsvg file to open</p>
    </div>
    <script type="module" src="/src/viewer/main.ts"></script>
  </body>
</html>
